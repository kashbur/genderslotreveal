<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Baby Jackpot Creator Access</title>
    <style>
      @font-face {
        font-family: 'SparkyStones';
        src: url('../sparkystones.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(1rem, 5vw, 3rem);
        background: #f8ecd0;
        color: #2f2a24;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      .access-card {
        width: min(430px, 100%);
        padding: clamp(1.25rem, 5vw, 2rem);
        border: 1px solid rgba(200, 145, 25, 0.2);
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.58), transparent 44%),
          #fffdf2;
        box-shadow: 0 22px 54px rgba(89, 55, 15, 0.12);
      }

      h1 {
        margin: 0 0 1rem;
        color: #986f17;
        font-family: 'SparkyStones', Georgia, serif;
        font-size: clamp(2.25rem, 10vw, 3.4rem);
        font-weight: 400;
        line-height: 0.95;
        text-align: center;
        text-shadow:
          0 2px 0 rgba(255, 255, 255, 0.85),
          0 8px 18px rgba(126, 94, 79, 0.14);
      }

      p {
        margin: 0 0 1.25rem;
        color: rgba(47, 42, 36, 0.78);
        font-size: 0.98rem;
        line-height: 1.55;
        text-align: center;
      }

      a {
        color: #2f776f;
        font-weight: 800;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        color: #986f17;
        font-size: 0.86rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-height: 48px;
        padding: 0.85rem 0.95rem;
        border: 1px solid rgba(200, 145, 25, 0.28);
        border-radius: 12px;
        background: #fffdf2;
        color: #2f2a24;
        font: inherit;
      }

      input:focus {
        border-color: #c89119;
        box-shadow: 0 0 0 3px rgba(247, 199, 77, 0.22);
        outline: none;
      }

      button {
        width: 100%;
        min-height: 48px;
        margin-top: 1rem;
        border: 0;
        border-radius: 12px;
        background: #f7c74d;
        color: #5b3f09;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        box-shadow: 0 8px 18px rgba(200, 145, 25, 0.22);
        transition: transform 120ms ease, box-shadow 120ms ease;
      }

      button:hover,
      button:focus-visible {
        transform: translateY(-1px);
        box-shadow: 0 12px 22px rgba(200, 145, 25, 0.26);
        outline: none;
      }

      button:active {
        transform: translateY(1px);
      }

      #error {
        min-height: 1.35em;
        margin-top: 0.75rem;
        color: #b65f78;
        font-weight: 800;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="access-card">
      <h1>Baby Jackpot Creator</h1>
      <p>
        You’ll find the password in the order confirmation PDF attached to your
        Etsy receipt. If you have any trouble accessing it, message
        <a href="https://www.etsy.com/shop/JoyJotStudio">JoyJotStudio</a> on Etsy.
      </p>
      <form id="passwordForm">
        <label for="password">Enter Password</label>
        <input
          type="password"
          id="password"
          required
          autocomplete="current-password"
        />
        <button type="submit">Enter Creator</button>
        <div id="error" aria-live="polite"></div>
      </form>
    </main>

    <script>
      const CREATOR_PASSWORDS = ["BabyJackpot2026"];

      document.getElementById("passwordForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const password = document.getElementById("password").value.trim();
        if (CREATOR_PASSWORDS.includes(password)) {
          window.location.href = "../form.html";
          return;
        }
        document.getElementById("error").textContent = "Incorrect password.";
      });
    </script>
  </body>
</html>
